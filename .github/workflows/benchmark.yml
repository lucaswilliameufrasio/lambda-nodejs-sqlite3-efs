name: benchmark

on:
  workflow_dispatch:
    inputs:
      vus:
        description: Virtual users
        required: false
        default: "20"
      duration:
        description: Test duration
        required: false
        default: "2m"

jobs:
  benchmark:
    runs-on: ubuntu-24.04

    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Nub
        uses: nubjs/setup-nub@v0

      - name: Install dependencies
        run: nub install

      - name: Start Floci
        run: docker compose -f docker-compose.floci.yml up -d

      - name: Configure local AWS env
        run: |
          echo "AWS_ENDPOINT_URL=http://localhost:4566" >> "$GITHUB_ENV"
          echo "AWS_ACCESS_KEY_ID=test" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=test" >> "$GITHUB_ENV"
          echo "AWS_DEFAULT_REGION=us-east-1" >> "$GITHUB_ENV"

      - name: Create FIFO queue in Floci
        run: |
          QUEUE_URL=$(aws \
            --endpoint-url "$AWS_ENDPOINT_URL" \
            sqs create-queue \
            --queue-name lambda-nodejs-sqlite3-efs-write-queue.fifo \
            --attributes FifoQueue=true,ContentBasedDeduplication=false \
            --query QueueUrl \
            --output text)

          echo "SQS_QUEUE_URL=$QUEUE_URL" >> "$GITHUB_ENV"

      - name: Start API
        run: |
          PORT=8080 \
          DATABASE_PATH=/tmp/users.db \
          SQS_QUEUE_URL="$SQS_QUEUE_URL" \
          AWS_ENDPOINT_URL="$AWS_ENDPOINT_URL" \
          AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID" \
          AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY" \
          AWS_DEFAULT_REGION="$AWS_DEFAULT_REGION" \
          nub src/index.ts > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for readiness
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/ >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done

          echo "API did not become ready in time"
          cat app.log || true
          exit 1

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 benchmark
        env:
          K6_VUS: "${{ github.event.inputs.vus || '20' }}"
          K6_DURATION: "${{ github.event.inputs.duration || '2m' }}"
        run: |
          k6 run \
            --vus "$K6_VUS" \
            --duration "$K6_DURATION" \
            --summary-trend-stats "avg,min,med,max,p(90),p(95),p(99)" \
            --summary-export summary.json \
            benchmarks/k6/mixed.js 2>&1 | tee k6-output.txt

      - name: Generate HTML report
        run: node scripts/generate-report.mjs summary.json benchmark-report

      - name: Add benchmark summary
        run: |
          echo "## Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ ! -f summary.json ]; then
            echo "summary.json not found" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"

          extract() {
            jq -r --arg key "$1" --arg val "$2" \
              '.metrics[$key].values[$val] // "n/a"' summary.json
          }

          REQUESTS=$(extract http_reqs count)
          AVG=$(extract http_req_duration avg)
          P95=$(extract http_req_duration "p(95)")
          P99=$(extract http_req_duration "p(99)")
          FAILED=$(extract http_req_failed rate)
          CHECKS=$(extract checks rate)

          echo "| Requests | $REQUESTS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Avg | ${AVG}ms |" >> "$GITHUB_STEP_SUMMARY"
          echo "| P95 | ${P95}ms |" >> "$GITHUB_STEP_SUMMARY"
          echo "| P99 | ${P99}ms |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Failed rate | $FAILED |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Checks rate | $CHECKS |" >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> POST /users measures enqueue latency and 202 acceptance, not persistence latency." >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./benchmark-report
          destination_dir: benchmark/latest
          keep_files: false

      - name: Add report URL to summary
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d "/" -f 2)
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "📊 [View full report](https://${{ github.repository_owner }}.github.io/$REPO_NAME/benchmark/latest)" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k6-benchmark-results
          path: |
            summary.json
            k6-output.txt
            app.log
            benchmark-report/

      - name: Print logs on failure
        if: failure()
        run: |
          echo "=== app.log ==="
          cat app.log || true
          echo "=== floci logs ==="
          docker compose -f docker-compose.floci.yml logs || true

      - name: Stop API
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi

      - name: Stop Floci
        if: always()
        run: docker compose -f docker-compose.floci.yml down -v
